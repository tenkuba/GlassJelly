<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:radial-gradient(ellipse at 20% 0%,#1a3a2a,#0a130f);color:#fff;font:var(--body);display:flex;flex-wrap:wrap;gap:12px;align-items:center}
  .btn{padding:12px 24px;border-radius:999px;font:var(--button);letter-spacing:.02em;border:1px solid;cursor:pointer;transition:.2s}
  .pri{background:linear-gradient(180deg,#2f7a4d,#24603c);color:#fff;border-color:#6faf84;box-shadow:0 4px 12px rgba(47,122,77,.35),inset 0 1px 0 rgba(255,255,255,.15)}
  .sec{background:rgba(255,255,255,.08);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);color:#fff;border-color:rgba(255,255,255,.14)}
  .ghost{background:transparent;color:rgba(255,255,255,.85);border-color:rgba(255,255,255,.2)}
  .danger{background:linear-gradient(180deg,#b03a3a,#8b2a2a);color:#fff;border-color:#d9534f}
  .icon{width:44px;height:44px;padding:0;display:inline-flex;align-items:center;justify-content:center}
</style></head><body>
  <button class="btn pri">▶ Play</button>
  <button class="btn sec">+ Add to Queue</button>
  <button class="btn ghost">Trailer</button>
  <button class="btn danger">Delete</button>
  <button class="btn sec icon">♥</button>
  <button class="btn sec icon">✓</button>
</body></html>
