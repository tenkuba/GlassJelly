<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:#0a0a0a;color:#fff;font:var(--body);display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
  .sw{height:110px;border-radius:12px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;font:var(--label);letter-spacing:var(--ls-wide);box-shadow:0 4px 16px rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.08)}
  .n{font:var(--body-sm);color:rgba(255,255,255,.7)}
</style></head><body>
<div class="sw" style="background:#525252"><div>accent-500</div><div class="n">#525252</div></div>
<div class="sw" style="background:#262626"><div>accent-600</div><div class="n">#262626</div></div>
<div class="sw" style="background:#a3a3a3;color:#111"><div>accent-300</div><div class="n" style="color:#111">#a3a3a3</div></div>
<div class="sw" style="background:#fafafa;color:#111"><div>accent-alt</div><div class="n" style="color:#111">#fafafa</div></div>
</body></html>
