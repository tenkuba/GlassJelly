<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:28px 32px;background:#0a130f;color:#fff;font:var(--body)}
  .row{display:flex;align-items:baseline;gap:16px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.06)}
  .label{width:160px;color:rgba(255,255,255,.5);font:var(--label);letter-spacing:var(--ls-uppercase);text-transform:uppercase}
  .sample{flex:1}
</style></head><body>
  <div class="row"><div class="label">H1 / 800</div><div class="sample" style="font:var(--h1);letter-spacing:-0.01em">Hereditary</div></div>
  <div class="row"><div class="label">H2 / 700</div><div class="sample" style="font:var(--h2)">Continue Watching</div></div>
  <div class="row"><div class="label">H3 / 600</div><div class="sample" style="font:var(--h3)">Season 2, Episode 4</div></div>
  <div class="row"><div class="label">Body / 400</div><div class="sample" style="font:var(--body)">A grieving family is haunted by tragedy and disturbing secrets.</div></div>
  <div class="row"><div class="label">Button / 600</div><div class="sample" style="font:var(--button);letter-spacing:.02em;text-transform:uppercase">▶ Play</div></div>
  <div class="row"><div class="label">Label / 600</div><div class="sample" style="font:var(--label);letter-spacing:var(--ls-uppercase);text-transform:uppercase;color:rgba(255,255,255,.7)">Rated HD · 1080p · 5.1</div></div>
</body></html>
