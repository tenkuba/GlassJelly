<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:#0a130f;color:#fff;font:var(--body);display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
  .sw{height:110px;border-radius:12px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;font:var(--label);letter-spacing:var(--ls-wide);box-shadow:0 4px 16px rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.08)}
  .n{font:var(--body-sm);color:rgba(255,255,255,.7)}
</style></head><body>
<div class="sw" style="background:#2f7a4d"><div>accent-500</div><div class="n">#2f7a4d</div></div>
<div class="sw" style="background:#24603c"><div>accent-600</div><div class="n">#24603c</div></div>
<div class="sw" style="background:#6faf84"><div>accent-300</div><div class="n">#6faf84</div></div>
<div class="sw" style="background:#d9a441;color:#1a1a1a"><div>accent-alt</div><div class="n" style="color:#333">#d9a441 amber</div></div>
</body></html>
