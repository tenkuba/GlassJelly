<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">

<div class="sw" style="background:#8a5a35"><div>accent-500</div><div class="n">#8a5a35</div></div>

<div class="sw" style="background:#c79871"><div>accent-300</div><div class="n">#c79871</div></div>
<div class="sw" style="background:#e0b97e;color:#1d140c"><div>accent-alt</div><div class="n" style="color:#1d140c">#e0b97e sand</div></div>
