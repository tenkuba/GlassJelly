<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:0;background:#0a130f;height:240px;color:#fff;font:var(--body);position:relative;overflow:hidden}
  .bg{position:absolute;inset:0;background:url("https://picsum.photos/seed/detail/900/240") center/cover;filter:brightness(.4) saturate(105%)}
  .overlay{position:absolute;inset:0;background:linear-gradient(180deg,rgba(10,19,15,.15) 0%,rgba(10,19,15,.88) 85%)}
  .content{position:relative;padding:28px 32px}
  h1{font:var(--h2);margin:0 0 6px 0}
  .meta{color:rgba(255,255,255,.7);font:var(--body-sm)}
  .btn{margin-top:14px;padding:10px 22px;border-radius:999px;background:linear-gradient(180deg,#2f7a4d,#24603c);border:1px solid #6faf84;color:#fff;font:var(--button);box-shadow:0 4px 12px rgba(47,122,77,.35),inset 0 1px 0 rgba(255,255,255,.15)}
</style></head><body>
  <div class="bg"></div><div class="overlay"></div>
  <div class="content">
    <div class="meta" style="color:rgba(255,255,255,.55);letter-spacing:.08em;text-transform:uppercase">Item Detail · brightness 0.4</div>
    <h1>Blade Runner 2049</h1>
    <div class="meta">2017 · 2h 44m · 4K HDR · ★ 8.0</div>
    <button class="btn">▶ Play</button>
  </div>
</body></html>
