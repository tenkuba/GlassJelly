<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:28px;background:#0a130f;color:#fff;font:var(--body);display:flex;gap:16px;justify-content:center;align-items:center}
  .card{width:180px;height:110px;border-radius:14px;background:rgba(120,170,140,.12);border:1px solid rgba(255,255,255,.12);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);display:flex;align-items:flex-end;padding:12px;font:var(--label);letter-spacing:var(--ls-wide);color:rgba(255,255,255,.75)}
  .s1{box-shadow:0 2px 8px rgba(0,0,0,.18)}
  .s2{box-shadow:0 8px 24px rgba(0,0,0,.32)}
  .s3{box-shadow:0 16px 48px rgba(0,0,0,.48)}
  .sg{box-shadow:0 0 32px rgba(47,122,77,.35),0 0 0 1px rgba(47,122,77,.6)}
</style></head><body>
  <div class="card s1">elevation 1</div>
  <div class="card s2">elevation 2</div>
  <div class="card s3">elevation 3</div>
  <div class="card sg">accent glow</div>
</body></html>
